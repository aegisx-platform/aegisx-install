# AegisX Platform - External Database Docker Compose (no PostgreSQL)
# Version: 1.6.0
# Usage: docker compose -f docker-compose.external-db.yml up -d
#
# This mode connects to an EXTERNAL PostgreSQL database.
# You must provide DATABASE_URL in the .env file pointing to your database.
# Redis is still included as it's used for caching and session management.

name: aegisx

services:
  # =============================================================================
  # Cache Service (Redis is always needed for sessions/caching)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: aegisx_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aegisx-network

  # =============================================================================
  # Application Services
  # =============================================================================
  api:
    image: ghcr.io/aegisx-platform/aegisx-starter-api:${IMAGE_TAG:-latest}
    container_name: aegisx_api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Server
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      API_PREFIX: /api

      # Database (external)
      DATABASE_URL: ${DATABASE_URL:?External DATABASE_URL is required}
      DATABASE_HOST: ${DATABASE_HOST:-}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-}
      DATABASE_NAME: ${DATABASE_NAME:-}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}

      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT secret is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      # Session
      SESSION_SECRET: ${SESSION_SECRET:?Session secret is required}

      # HIS Integration
      HIS_ENCRYPTION_SECRET: ${HIS_ENCRYPTION_SECRET:?HIS encryption secret is required}

      # Migration Wizard (required for inventory-domain plugin since v1.45.1)
      # Generate with: openssl rand -hex 32
      MIGRATION_ENCRYPTION_KEY: "${MIGRATION_ENCRYPTION_KEY:?MIGRATION_ENCRYPTION_KEY is required - generate with openssl rand -hex 32}"

      # Security
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # File uploads
      UPLOAD_DIR: /app/uploads
    ports:
      - '${API_PORT:-3333}:3000'
    volumes:
      - uploads_data:/app/uploads
      - ./config/api:/app/config:ro
      - ./logs/api:/app/logs
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - aegisx-network

  web:
    image: ghcr.io/aegisx-platform/aegisx-starter-web:${IMAGE_TAG:-latest}
    container_name: aegisx_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: ${API_URL:-http://localhost:3333/api}
      APP_NAME: ${APP_NAME:-AegisX Platform}
      APP_VERSION: ${APP_VERSION:-1.6.0}
      ENABLE_ANALYTICS: ${ENABLE_ANALYTICS:-false}
      ENABLE_DEBUG: ${ENABLE_DEBUG:-false}
    ports:
      - '${WEB_PORT:-8080}:8080'
    volumes:
      - ./config/web:/etc/nginx/conf.d:ro
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aegisx-network

  # =============================================================================
  # Reverse Proxy (Nginx Proxy Manager)
  # =============================================================================
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: aegisx_npm
    restart: unless-stopped
    ports:
      - '${NPM_HTTP_PORT:-80}:80'
      - '${NPM_HTTPS_PORT:-443}:443'
      - '${NPM_ADMIN_PORT:-81}:81'
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:81/api/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - aegisx-network

# =============================================================================
# Networks
# =============================================================================
networks:
  aegisx-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis_data:
    driver: local
  uploads_data:
    driver: local
  npm_data:
    driver: local
  npm_letsencrypt:
    driver: local
