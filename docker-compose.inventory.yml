# AegisX Inventory System - Production Docker Compose
# Version: 1.0.0
# Usage: docker compose -f docker-compose.inventory.yml up -d

name: aegisx-inventory

services:
  # =============================================================================
  # Database Services
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: aegisx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password is required}
      POSTGRES_DB: ${POSTGRES_DB:-aegisx_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aegisx_db}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aegisx-network

  redis:
    image: redis:7-alpine
    container_name: aegisx_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aegisx-network

  # =============================================================================
  # Application Services
  # =============================================================================
  api:
    image: ghcr.io/aegisx-platform/aegisx-starter-api:${IMAGE_TAG:-latest}
    container_name: aegisx_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Server
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      API_PREFIX: /api

      # Database
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aegisx_db}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB:-aegisx_db}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}

      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT secret is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      # Session
      SESSION_SECRET: ${SESSION_SECRET:?Session secret is required}

      # HIS Integration
      HIS_ENCRYPTION_SECRET: ${HIS_ENCRYPTION_SECRET:?HIS encryption secret is required}

      # Migration Wizard (required for inventory-domain plugin since v1.45.1)
      # Generate with: openssl rand -hex 32
      MIGRATION_ENCRYPTION_KEY: "${MIGRATION_ENCRYPTION_KEY:?MIGRATION_ENCRYPTION_KEY is required - generate with openssl rand -hex 32}"

      # Security
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}

    ports:
      - '${API_PORT:-3333}:3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - aegisx-network

  web:
    image: ghcr.io/aegisx-platform/aegisx-starter-web:${IMAGE_TAG:-latest}
    container_name: aegisx_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Runtime config (injected via docker-entrypoint.sh)
      API_URL: ${API_URL:-http://localhost:3333/api}
      APP_NAME: ${APP_NAME:-AegisX Inventory}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      ENABLE_ANALYTICS: ${ENABLE_ANALYTICS:-false}
      ENABLE_DEBUG: ${ENABLE_DEBUG:-false}
    ports:
      - '${WEB_PORT:-8080}:8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aegisx-network

  # =============================================================================
  # Automated Database Backup
  # =============================================================================
  db-backup:
    image: prodrigestivill/postgres-backup-local:15-alpine
    container_name: aegisx_db_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-aegisx_db}
      POSTGRES_EXTRA_OPTS: '--schema=public --schema=inventory --no-owner --no-privileges'
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
      HEALTHCHECK_PORT: 8080
      TZ: ${TZ:-Asia/Bangkok}
    volumes:
      - ./backups:/backups
    networks:
      - aegisx-network

  # =============================================================================
  # Reverse Proxy (Nginx Proxy Manager)
  # =============================================================================
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: aegisx_npm
    restart: unless-stopped
    ports:
      - '${NPM_HTTP_PORT:-80}:80'
      - '${NPM_HTTPS_PORT:-443}:443'
      - '${NPM_ADMIN_PORT:-81}:81'
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:81/api/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - aegisx-network

# =============================================================================
# Networks
# =============================================================================
networks:
  aegisx-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  npm_data:
    driver: local
  npm_letsencrypt:
    driver: local
